name: Tests

on:
  push:
  pull_request:

jobs:
  phpunit:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
        # 'without' proves core is self-contained (node tests skip); 'with' installs
        # the optional federation package on demand and runs the node-integration tests.
        federation: ['without', 'with']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: mbstring, dom, curl, sqlite3, pdo_sqlite

      - name: Validate composer.json
        run: composer validate --strict

      - name: Configure composer (do not block dev deps on advisories)
        # Deliberate, not a workaround: orchestra/testbench (a require-DEV dependency)
        # pulls transitive laravel/framework versions that carry advisories. Those are
        # part of the TEST harness only — the package's runtime `require` has no
        # laravel/framework (just specific illuminate/* components), so consumers never
        # install them. We therefore don't let composer's advisory policy block the test
        # toolchain here, and instead gate the RUNTIME tree explicitly below.
        run: composer config --no-plugins policy.advisories.block false

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction

      - name: Audit runtime dependencies for security advisories
        # Gates only what consumers actually inherit (the non-dev tree). Dev-only
        # advisories are excluded above; real runtime advisories must still fail CI.
        run: composer audit --no-dev --abandoned=ignore

      - name: Install optional federation package (matrix with)
        if: matrix.federation == 'with'
        run: |
          composer require --dev m-tech-stack/laravel-ai-engine-federation:dev-main --no-interaction

      - name: Run tests
        run: |
          set +e
          # Run BOTH suites. phpunit.xml sets defaultTestSuite="Unit", so omitting
          # --testsuite would silently skip every Feature test (API, security, IDOR).
          vendor/bin/phpunit --testsuite Unit,Feature --order-by=default --display-errors --display-warnings --display-deprecations --display-notices 2>&1 | tee /tmp/phpunit.log
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            tail -n 120 /tmp/phpunit.log
            message=$(tail -n 40 /tmp/phpunit.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=PHPUnit failed::$message"
          fi

          exit "$status"
